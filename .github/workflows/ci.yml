name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Build extension bundle
        run: npm run build

  release:
    name: Release to marketplaces
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 2

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect version bump
        id: version
        run: |
          NEW=$(jq -r .version package.json)
          OLD=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version || echo "")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ -z "$OLD" ] || [ "$NEW" = "$OLD" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "package.json version unchanged ($NEW); skipping marketplace publish."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: $OLD → $NEW"
          fi

      - name: Check marketplace tokens
        id: tokens
        if: steps.version.outputs.bumped == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "vsce=true" >> "$GITHUB_OUTPUT"
          else
            echo "vsce=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT not set; VS Code Marketplace publish will be skipped."
          fi
          if [ -n "$OVSX_PAT" ]; then
            echo "ovsx=true" >> "$GITHUB_OUTPUT"
          else
            echo "ovsx=false" >> "$GITHUB_OUTPUT"
            echo "OVSX_PAT not set; Open VSX publish will be skipped."
          fi

      - name: Package extension
        if: steps.version.outputs.bumped == 'true' && (steps.tokens.outputs.vsce == 'true' || steps.tokens.outputs.ovsx == 'true')
        id: package
        run: |
          npm run package
          echo "vsix=$(ls -1 laravel-vue-navigator-*.vsix | head -1)" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        if: steps.version.outputs.bumped == 'true' && steps.tokens.outputs.vsce == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath "${{ steps.package.outputs.vsix }}" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: steps.version.outputs.bumped == 'true' && steps.tokens.outputs.ovsx == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish "${{ steps.package.outputs.vsix }}" -p "$OVSX_PAT"
