name: Feature request
description: Suggest an idea for Laravel-Vue Navigator
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please check the README section **"What is intentionally out of scope"** before submitting.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other tools you tried?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Examples, screenshots, links to similar extensions
